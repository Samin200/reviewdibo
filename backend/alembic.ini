# Alembic configuration. The actual sqlalchemy.url is set dynamically in
# alembic/env.py from the DATABASE_URL environment variable (sync driver).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder; overridden in env.py.
sqlalchemy.url = postgresql+psycopg2://user:password@localhost:5432/reviewdibo

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
